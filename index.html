<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Mobile Preview</title>
  <style>
    body {
      margin: 0;
      min-height: 100vh;
      display: flex;
      justify-content: center;
      padding: 16px;
      background: #20242b;
      font-family: Arial, sans-serif;
    }

    .phone {
      width: 375px;
      height: 667px;
      overflow: auto;
      background: #ffffff;
      border: 8px solid #111111;
      border-radius: 28px;
      box-shadow: 0 18px 40px rgba(0, 0, 0, 0.35);
    }

    iframe {
      display: block;
      width: 375px;
      height: 667px;
      border: 0;
    }
  </style>
</head>
<body>
  <div class="phone">
    <iframe src="./index.html" title="Phone-sized app preview"></iframe>
  </div>
</body>
</html>
